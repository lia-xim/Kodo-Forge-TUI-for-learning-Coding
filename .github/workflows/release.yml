name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger z.B. bei einem Tag wie "v1.0.0"

jobs:
  release:
    name: Build & Release Executables
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'

      - name: Install Dependencies
        working-directory: ./platform
        run: npm install

      - name: Build Windows x64
        working-directory: ./platform
        run: bun run build:win

      - name: Build macOS Apple Silicon
        working-directory: ./platform
        run: bun run build:mac

      - name: Build macOS Intel
        working-directory: ./platform
        run: bun run build:mac-intel

      - name: Build Linux x64
        working-directory: ./platform
        run: bun run build:linux

      - name: Build Linux ARM64
        working-directory: ./platform
        run: bun run build:linux-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            platform/dist/kodo-forge.exe
            platform/dist/kodo-forge-macos-arm64
            platform/dist/kodo-forge-macos-x64
            platform/dist/kodo-forge-linux-x64
            platform/dist/kodo-forge-linux-arm64
